name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: Validate source tree
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install zsh for script checks
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Show repository layout
        run: find . -maxdepth 3 -type f | sort

      - name: Check Python syntax
        run: |
          set -euo pipefail
          if find src -name '*.py' -type f 2>/dev/null | grep -q .; then
            python -m compileall -q src
          else
            echo "No Python files found under src/. Skipping."
          fi

      - name: Check zsh shell scripts
        run: |
          set -euo pipefail
          if find scripts -name '*.sh' -type f 2>/dev/null | grep -q .; then
            while IFS= read -r script; do
              echo "Checking $script"
              zsh -n "$script"
            done < <(find scripts -name '*.sh' -type f | sort)
          else
            echo "No shell scripts found under scripts/. Skipping."
          fi

      - name: Build Python package if pyproject exists
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ]; then
            python -m pip install --upgrade pip build
            python -m build --sdist --wheel
          else
            echo "No pyproject.toml found. Skipping package build."
          fi

  build-conda-wrapper:
    name: Build conda-wrapper app (${{ matrix.target }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macOS arm64
            runner: macos-14
            artifact_name: markitdown-handy-conda-wrapper-macos-arm64
          - target: macOS x86_64
            runner: macos-15-intel
            artifact_name: markitdown-handy-conda-wrapper-macos-x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner information
        run: |
          sw_vers
          uname -a
          uname -m

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build conda-wrapper app
        run: ./scripts/build_conda_wrapper_app.sh
        shell: zsh --no-rcs {0}

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-conda/*.zip
          if-no-files-found: error
          retention-days: 14
